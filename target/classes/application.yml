server:
  port: 8082
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: pet-platform
  
  # H2内存数据库配置（无需安装MySQL，适合快速测试）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:pet_platform;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      encoding: UTF-8
  
  redis:
    redisson:
      enabled: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.pet.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    default-executor-type: simple
    default-statement-timeout: 25000
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: petPlatformSecretKey2024ForJWTTokenGeneration
  expiration: 86400000  # 24小时
  header: Authorization
  token-prefix: Bearer

# 日志配置
logging:
  level:
    com.pet.mapper: debug
    org.springframework.security: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# 推荐算法配置
recommendation:
  user-cf-weight: 0.4
  item-cf-weight: 0.4
  svd-weight: 0.2
  similarity-threshold: 0.3
  max-recommendations: 10
  svd-dimensions: 50
